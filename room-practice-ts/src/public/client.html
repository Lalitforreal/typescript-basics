<!DOCTYPE html>
<html>
  <head>
    <title>Socket.io Chat</title>
  </head>
  <body>
    <h2>Socket.io Client 1</h2>
    <input id="msg" placeholder="Type message..." />
    <button onclick="sendMsg()">Send</button>
    <ul id="list"></ul>
    <button onclick="leaveRoom()">Leave Room</button>
    <button onclick="disconnect()">Disconnect</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        console.log("runnign script");
        const socket = io("http://localhost:3000");
        const list = document.getElementById("list");
        const roomId = "hanji janab";
        socket.on("connect",()=>{
            console.log("connected client side");
        })

        socket.emit("room-join", roomId);
        socket.on("welcome", (msg)=>{
            addLi(msg);
        })
        socket.on("send-to-room", (msg)=>{
            addLi(`by ${msg.from}: ` + msg.msg);
        })

        

        function sendMsg(){
            const msg = document.getElementById("msg").value;
            //  send message into room
            socket.emit("send-to-room",  {msg} );
        }
        function addLi(text) {
            const li = document.createElement("li");
            li.innerText = text;
            list.appendChild(li);
        }


    </script>
  </body>
</html>
